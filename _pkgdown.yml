url: https://lsms-worldbank.github.io/susometa/
template:
  bootstrap: 5

reference:
- title: Questionnaire
  desc: >
    Functions for getting full questionnaire content or questionnaire metadata.
  contents:
  - parse_questionnaire
  - get_qnr_metadata
- title: Groups
  desc: >
    Get metadata about groups that contain questions
  contents:
  - get_sections
  - get_sub_sections
  - get_rosters
- title: Content
  desc: >
    Get metadata about questions, variables, and static text
  contents:
  - get_questions
  - get_variables
  - get_questions_by_section
  - get_static_texts
  - get_validations
- title: Answer options
  desc: >
    Get answer options, however they are defined in Designer--
    whether
  contents:
  - get_answer_options
  - get_ms_answers_as_var_labels
- title: Resources
  contents:
  - get_macros
  - get_categories
  - get_translations
  - get_attachments
  - get_lookup_tables
  - get_critical_rules
- title: Parsing tools
  desc: >
    Low-level tools for parsing questionnaire metadata
- subtitle: Reusable categories
  contents:
  - find_categories
  - parse_categories
  - parse_categories_file
  - reshape_categories
  - join_categories
